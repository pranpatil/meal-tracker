name: Deploy to GCS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload to GCS
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        run: |
          # HTML — no cache so users always get the latest index
          gsutil -h "Content-Type:text/html" -h "Cache-Control:no-cache,no-store" \
            cp dist/index.html "gs://$GCS_BUCKET/"

          # JS — Vite outputs content-hashed filenames, safe to cache forever
          gsutil -m -h "Content-Type:application/javascript" -h "Cache-Control:public,max-age=31536000,immutable" \
            cp dist/assets/*.js "gs://$GCS_BUCKET/assets/"

          # CSS
          gsutil -m -h "Content-Type:text/css" -h "Cache-Control:public,max-age=31536000,immutable" \
            cp dist/assets/*.css "gs://$GCS_BUCKET/assets/"

          # Any remaining assets (images, fonts, etc.)
          shopt -s extglob
          gsutil -m cp dist/assets/!(*.js|*.css) "gs://$GCS_BUCKET/assets/" 2>/dev/null || true
